<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>マイページ — WeightTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .toast-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" style="min-width:1440px;" x-data="weightTracker()" x-init="init()">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <span class="text-xl font-bold text-indigo-600">⚖️ WeightTracker</span>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm">田</div>
          <span class="text-sm font-medium text-gray-700">田中 太郎</span>
        </div>
        <button
          @click="window.location.href='login.html'"
          class="text-sm px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition"
        >ログアウト</button>
      </div>
    </div>
  </header>

  <!-- トースト通知 -->
  <div
    x-show="toast.show"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-x-full"
    x-transition:enter-end="opacity-100 translate-x-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed top-20 right-6 z-50 bg-emerald-500 text-white px-5 py-3 rounded-xl shadow-lg font-medium"
    style="display: none;"
  >
    ✅ 体重を記録しました！
  </div>

  <!-- メインコンテンツ -->
  <main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

    <!-- ① 体重登録カード -->
    <div class="bg-white rounded-2xl shadow-md p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-5">📝 体重を記録する</h2>
      <form @submit.prevent="addRecord" class="flex flex-wrap items-end gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-600">日付</label>
          <input
            type="date"
            x-model="newRecord.date"
            class="px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
          >
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-600">体重</label>
          <div class="flex items-center gap-2">
            <input
              type="number"
              step="0.1"
              x-model="newRecord.weight"
              placeholder="63.5"
              class="w-28 px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
            >
            <span class="text-sm text-gray-500 font-medium">kg</span>
          </div>
        </div>
        <button
          type="submit"
          class="px-6 py-2.5 rounded-xl text-white font-semibold text-sm hover:opacity-90 transition"
          style="background-color: #6366F1;"
        >記録する</button>
      </form>
    </div>

    <!-- ② 体重推移グラフカード -->
    <div class="bg-white rounded-2xl shadow-md p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-5">📈 体重推移</h2>
      <div style="height: 350px; position: relative;">
        <canvas id="weightChart"></canvas>
      </div>
    </div>

    <!-- ③ 記録一覧カード -->
    <div class="bg-white rounded-2xl shadow-md p-6">
      <h2 class="text-lg font-bold text-gray-900 mb-5">📋 記録一覧</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="text-left pb-3 text-gray-500 font-medium">日付</th>
              <th class="text-right pb-3 text-gray-500 font-medium">体重 (kg)</th>
              <th class="text-right pb-3 text-gray-500 font-medium">前日差</th>
              <th class="text-right pb-3 text-gray-500 font-medium">操作</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(record, index) in recentRecords" :key="record.id">
              <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                <td class="py-3 text-gray-700" x-text="record.date"></td>
                <td class="py-3 text-right font-semibold text-gray-900" x-text="record.weight.toFixed(1)"></td>
                <td class="py-3 text-right font-medium" :class="record.diff > 0 ? 'text-red-500' : record.diff < 0 ? 'text-emerald-500' : 'text-gray-400'">
                  <span x-text="record.diff > 0 ? '+' + record.diff.toFixed(1) : record.diff < 0 ? record.diff.toFixed(1) : '—'"></span>
                </td>
                <td class="py-3 text-right">
                  <button
                    @click="deleteRecord(record.id)"
                    class="text-xs px-3 py-1 border border-red-300 text-red-500 rounded-lg hover:bg-red-50 transition"
                  >削除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <p x-show="recentRecords.length === 0" class="text-center text-gray-400 py-6 text-sm">記録がありません</p>
      </div>
    </div>

  </main>

  <script>
    function weightTracker() {
      return {
        records: [],
        newRecord: { date: '', weight: '' },
        toast: { show: false },
        chart: null,

        init() {
          // 今日の日付をデフォルトに設定
          const today = new Date();
          this.newRecord.date = today.toISOString().split('T')[0];

          // ダミーデータ生成（過去30日分）
          for (let i = 29; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            const weight = 58 + Math.random() * 10; // 58〜68kg
            this.records.push({
              id: Date.now() - i * 86400000,
              date: dateStr,
              weight: Math.round(weight * 10) / 10
            });
          }

          // グラフ初期化（Alpine.js の DOM 反映後）
          this.$nextTick(() => {
            this.initChart();
          });
        },

        get recentRecords() {
          const sorted = [...this.records].sort((a, b) => b.date.localeCompare(a.date));
          return sorted.slice(0, 10).map((record, idx) => {
            const next = sorted[idx + 1];
            const diff = next ? Math.round((record.weight - next.weight) * 10) / 10 : 0;
            return { ...record, diff };
          });
        },

        addRecord() {
          if (!this.newRecord.date || !this.newRecord.weight) return;
          const record = {
            id: Date.now(),
            date: this.newRecord.date,
            weight: parseFloat(this.newRecord.weight)
          };
          this.records.push(record);
          this.records.sort((a, b) => a.date.localeCompare(b.date));
          this.newRecord.weight = '';
          this.updateChart();
          this.showToast();
        },

        deleteRecord(id) {
          this.records = this.records.filter(r => r.id !== id);
          this.updateChart();
        },

        showToast() {
          this.toast.show = true;
          setTimeout(() => { this.toast.show = false; }, 2000);
        },

        initChart() {
          const ctx = document.getElementById('weightChart').getContext('2d');
          const chartData = this.getChartData();
          this.chart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: chartData.labels,
              datasets: [{
                label: '体重 (kg)',
                data: chartData.weights,
                borderColor: '#6366F1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#6366F1',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: ctx => `体重: ${ctx.parsed.y.toFixed(1)} kg`
                  }
                }
              },
              scales: {
                x: {
                  grid: { color: 'rgba(0,0,0,0.05)' },
                  ticks: { maxTicksLimit: 10, font: { size: 11 } }
                },
                y: {
                  min: 55,
                  max: 75,
                  grid: { color: 'rgba(0,0,0,0.05)' },
                  ticks: {
                    callback: v => v + ' kg',
                    font: { size: 11 }
                  }
                }
              }
            }
          });
        },

        getChartData() {
          const sorted = [...this.records].sort((a, b) => a.date.localeCompare(b.date));
          return {
            labels: sorted.map(r => r.date.slice(5)),  // MM-DD形式
            weights: sorted.map(r => r.weight)
          };
        },

        updateChart() {
          if (!this.chart) return;
          const chartData = this.getChartData();
          this.chart.data.labels = chartData.labels;
          this.chart.data.datasets[0].data = chartData.weights;
          this.chart.update();
        }
      };
    }
  </script>
</body>
</html>
