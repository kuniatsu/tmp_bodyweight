<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>ログイン — WeightTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" style="min-width:1440px;">
  <div class="min-h-screen flex items-center justify-center py-12" x-data="{
    email: '',
    password: '',
    loading: false,
    errors: {},
    validate() {
      this.errors = {};
      if (!this.email) this.errors.email = 'メールアドレスを入力してください';
      if (!this.password) this.errors.password = 'パスワードを入力してください';
      return Object.keys(this.errors).length === 0;
    },
    async submit() {
      if (!this.validate()) return;
      this.loading = true;
      await new Promise(r => setTimeout(r, 2000));
      window.location.href = 'mypage.html';
    }
  }">
    <div class="w-full max-w-md px-8 py-10 bg-white rounded-2xl shadow-xl">
      <!-- ロゴ -->
      <div class="flex justify-center mb-6">
        <span class="text-2xl font-bold text-indigo-600">⚖️ WeightTracker</span>
      </div>

      <!-- 見出し -->
      <h1 class="text-3xl font-bold text-gray-900 text-center mb-8">ログイン</h1>

      <form @submit.prevent="submit" novalidate>
        <!-- メールアドレス -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="email">メールアドレス</label>
          <input
            id="email"
            type="email"
            x-model="email"
            placeholder="you@example.com"
            class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            :class="errors.email ? 'border-red-400' : 'border-gray-300'"
          >
          <p x-show="errors.email" x-text="errors.email" class="mt-1 text-sm text-red-500"></p>
        </div>

        <!-- パスワード -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">パスワード</label>
          <input
            id="password"
            type="password"
            x-model="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            :class="errors.password ? 'border-red-400' : 'border-gray-300'"
          >
          <p x-show="errors.password" x-text="errors.password" class="mt-1 text-sm text-red-500"></p>
        </div>

        <!-- ログインボタン -->
        <button
          type="submit"
          :disabled="loading"
          class="w-full py-3 rounded-xl text-white font-semibold transition-all duration-200 hover:opacity-90 active:scale-95 disabled:opacity-70"
          style="background-color: #6366F1;"
        >
          <span x-text="loading ? 'ログイン中...' : 'ログイン'"></span>
        </button>
      </form>

      <!-- 区切り線 -->
      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="mx-4 text-sm text-gray-400">または</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- 新規登録リンク -->
      <p class="text-center text-sm text-gray-500">
        アカウントをお持ちでない方は
        <a href="register.html" class="text-indigo-600 font-medium hover:underline">新規登録はこちら</a>
      </p>
    </div>
  </div>
</body>
</html>
